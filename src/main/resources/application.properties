# OpenAPI spec export at build time (for moza-portaal codegen)
quarkus.smallrye-openapi.store-schema-directory=target/openapi

%dev.quarkus.http.port=8082

# Database
# Do not use this in production
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%prod.quarkus.hibernate-orm.schema-management.strategy=update

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.max-size=16
quarkus.datasource.username=user
quarkus.datasource.password=password
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/actualiteiten
# Override for production - values will come from the secret
%prod.quarkus.datasource.jdbc.url=
%prod.quarkus.datasource.username=
%prod.quarkus.datasource.password=

# Profiel Service client (for koppelcode resolution)
quarkus.rest-client.profiel-service.url=http://localhost:8080
%prod.quarkus.rest-client.profiel-service.url=

# Ondernemersplein OpenData API (public, no auth)
quarkus.rest-client.ondernemersplein.url=https://opendata.ondernemersplein.nl
%prod.quarkus.rest-client.ondernemersplein.url=

# Caching (Caffeine) — one entry per cache, holds the full enriched list.
# Scheduler refreshes at 55m so the cache stays warm well before TTL expiry.
quarkus.cache.caffeine.enriched-articles.expire-after-write=1H
quarkus.cache.caffeine.enriched-subsidies.expire-after-write=1H

# Koppelcode lookup — stable for a partij's lifetime, long TTL is fine.
quarkus.cache.caffeine.koppelcodes.expire-after-write=1H

# SRU bekendmakingen — cached per-postcode.
quarkus.cache.caffeine.sru-by-postcode.expire-after-write=1H

# Overheid.nl SRU
sru.base-url=https://repository.overheid.nl/sru
sru.maximum-records=50

quarkus.datasource.metrics.enabled=true
