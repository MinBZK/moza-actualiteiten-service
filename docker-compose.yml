services:
  postgres:
    image: postgres:18
    container_name: actualiteiten_postgres
    environment:
      POSTGRES_DB: actualiteiten
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d actualiteiten"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
